<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Вход — KontPortal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06040f;--p1:#a855f7;--p2:#6366f1;--p3:#22d3ee;--hot:#f472b6;--border:rgba(255,255,255,0.08);--text:#f1f0ff;--text-muted:#7c7a99;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
canvas{position:fixed;inset:0;z-index:0;opacity:.6;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:1.5rem;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.75rem 2.25rem;backdrop-filter:blur(24px);box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(168,85,247,.1);}
.logo{display:flex;align-items:center;justify-content:center;gap:.65rem;margin-bottom:.5rem;}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(168,85,247,.5);}
.logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.04em;}
.logo-text .k{color:var(--p1);}
.subtitle{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:2rem;margin-top:.25rem;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:.7rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.45rem;}
.fg input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.78rem 1.1rem;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:all .22s;}
.fg input:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(168,85,247,.15);background:rgba(168,85,247,.06);}
.btn{display:block;width:100%;padding:.88rem;background:linear-gradient(135deg,var(--p1),var(--p2));color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .25s;margin-top:1.5rem;letter-spacing:.01em;box-shadow:0 4px 24px rgba(168,85,247,.35);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(168,85,247,.5);}
.link-row{text-align:center;margin-top:1.35rem;font-size:.84rem;color:var(--text-muted);}
.link-row a{color:var(--p3);text-decoration:none;font-weight:600;}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;padding:.8rem 1rem;border-radius:10px;font-size:.84rem;margin-bottom:1rem;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
<div class="card">
    <div class="logo">
        <div class="logo-icon"><svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M3 14L7 6L10 12L13 8L17 14" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="4" r="2" fill="rgba(255,255,255,.6)"/></svg></div>
        <div class="logo-text"><span class="k">K</span>ontPortal</div>
    </div>
    <div class="subtitle">Войдите в аккаунт</div>
    {% if form.errors %}<div class="err">Неверный логин или пароль</div>{% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="fg"><label>Имя пользователя</label><input type="text" name="username" autofocus autocomplete="username"></div>
        <div class="fg"><label>Пароль</label><input type="password" name="password" autocomplete="current-password"></div>
        <button type="submit" class="btn">Войти →</button>
    </form>
    <div class="link-row">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></div>
</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);
const orbs=[{x:.2,y:.2,r:.35,c:'rgba(168,85,247,',ph:0,sp:.0003},{x:.8,y:.7,r:.3,c:'rgba(99,102,241,',ph:2,sp:.0004},{x:.5,y:.9,r:.25,c:'rgba(34,211,238,',ph:4,sp:.00035}];
function draw(){
    ctx.clearRect(0,0,W,H);
    const t=Date.now();
    orbs.forEach(o=>{
        const cx=(o.x+Math.sin(t*o.sp+o.ph)*.08)*W;
        const cy=(o.y+Math.cos(t*o.sp+o.ph)*.06)*H;
        const r=o.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
        g.addColorStop(0,o.c+'.2)');g.addColorStop(1,o.c+'0)');
        ctx.beginPath();ctx.fillStyle=g;ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body></html>
